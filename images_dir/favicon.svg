<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3d2a06"/>
      <stop offset="100%" stop-color="#150e02"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f7e08a"/>
      <stop offset="50%"  stop-color="#c9920c"/>
      <stop offset="100%" stop-color="#8a6200"/>
    </linearGradient>
    <linearGradient id="steamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#c9920c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f7e08a" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bgGrad)"/>

  <!-- ── Sauna bench platform (2 tiers) ── -->
  <rect x="2"  y="22.5" width="28" height="3"   rx="1.2" fill="url(#goldGrad)" opacity="0.95"/>
  <rect x="5"  y="17.5" width="22" height="2.5" rx="1"   fill="url(#goldGrad)" opacity="0.85"/>

  <!-- ── Kiuas / stove body ── -->
  <rect x="3" y="19.5" width="5" height="3" rx="1" fill="url(#goldGrad)" opacity="0.65"/>
  <!-- sauna stones -->
  <ellipse cx="4.8" cy="19.5" rx="1"   ry="0.75" fill="#f5d96a" opacity="0.95"/>
  <ellipse cx="6.8" cy="19.3" rx="0.9" ry="0.65" fill="#e0b840" opacity="0.9"/>
  <ellipse cx="5.8" cy="19.9" rx="0.7" ry="0.5"  fill="#c9920c" opacity="0.85"/>

  <!-- ── Steam wisps (3 wavy rising lines) ── -->
  <path d="M4.8 18.7 C4.1 17.2 5.5 15.8 4.8 14.3 C4.1 12.8 5.2 11.5 4.8 10.2"
        fill="none" stroke="url(#steamGrad)" stroke-width="1.15" stroke-linecap="round"/>
  <path d="M6.8 18.4 C6.0 16.8 7.5 15.3 6.8 13.7 C6.1 12.1 7.2 10.8 6.8 9.4"
        fill="none" stroke="url(#steamGrad)" stroke-width="1.15" stroke-linecap="round" opacity="0.8"/>
  <path d="M8.8 18.7 C8.0 17.2 9.4 15.7 8.7 14.2 C8.0 12.7 9.1 11.4 8.7 10.0"
        fill="none" stroke="url(#steamGrad)" stroke-width="1"   stroke-linecap="round" opacity="0.6"/>

  <!-- ── Water droplet (cold bath / spa) — right side ── -->
  <!-- droplet shape: teardrop pointing down -->
  <path d="M24 5 C24 5 20 10 20 13 C20 15.8 21.8 17.5 24 17.5 C26.2 17.5 28 15.8 28 13 C28 10 24 5 24 5 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="1.2" stroke-linejoin="round" opacity="0.9"/>
  <!-- ℃ temp hint inside drop — tiny wave lines suggesting cold water -->
  <path d="M22 12 Q23 11 24 12 Q25 13 26 12" fill="none" stroke="#f7e08a" stroke-width="0.9" stroke-linecap="round" opacity="0.85"/>
  <path d="M22 14 Q23 13 24 14 Q25 15 26 14" fill="none" stroke="#f7e08a" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>
</svg>
